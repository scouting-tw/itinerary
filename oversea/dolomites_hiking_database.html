<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多洛米蒂徒步權威指南 (2026) | 40 條經典路線解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --difficulty-easy: #10b981;
            --difficulty-medium: #f59e0b;
            --difficulty-hard: #ef4444;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-dark: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }

        .hero-section {
            position: relative;
            height: 40vh;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--primary);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transform: scale(1.05);
            transition: transform 10s linear;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, #f8fafc, transparent);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .difficulty-tag {
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-easy { background: #dcfce7; color: #166534; }
        .tag-medium { background: #fef3c7; color: #92400e; }
        .tag-hard { background: #fee2e2; color: #991b1b; }

        .hike-row {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .hike-row:hover {
            background-color: #f1f5f9;
        }

        .hike-row.active {
            background-color: #f0fdf4;
            border-left: 4px solid #10b981;
        }

        .map-container {
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -6px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }

        @media (max-width: 1024px) {
            .map-container {
                position: relative;
                height: 450px;
                top: 0;
                margin-bottom: 2rem;
            }
        }

        /* Custom scrollbar for table container */
        .table-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Main Content -->

                                <button onclick="filterHikes('中等')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold border border-slate-200 bg-white hover:bg-slate-50 transition-all">中等</button>

                        </div>
                    </div>

                    <!-- Table -->
                    <div class="table-scroll overflow-x-auto max-h-[800px] overflow-y-auto">
                        <table class="w-full hike-table text-left border-collapse">
                            <thead class="bg-slate-50 text-slate-500 text-xs font-bold uppercase sticky top-0 z-10">
                                <tr>
                                    <th class="px-6 py-4">路線名稱</th>
                                    <th class="px-6 py-4">區域</th>
                                    <th class="px-6 py-4">難度</th>
                                    <th class="px-6 py-4 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="hikeList" class="text-sm divide-y divide-slate-100">
                                <!-- JS population -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Sticky Map -->
            <div class="lg:w-5/12 order-1 lg:order-2">
                <div class="map-container">
                    <iframe id="mapFrame" 
                        src="https://www.google.com/maps/d/embed?mid=1dm50krnt7U7fzArdIuKK-EXnnJ2fOkvJ&femb=1" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    
                    <!-- Map Info Overlay -->
                    <div class="absolute bottom-6 left-6 right-6 p-4 glass-card rounded-2xl border border-white/40 pointer-events-none">
                        <p id="mapTitle" class="text-sm font-bold text-slate-900 mb-1">正在查看：全域導覽</p>
                        <p id="mapDesc" class="text-xs text-slate-600">點擊路線查看具體位置</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-20 text-center border-t pt-10 border-slate-200">
            <p class="text-sm text-slate-400 mb-4">© 2026 Dolomites Interactive Guide. Powered by Moon & Honey Travel.</p>
            <a href="dolomites.html" class="inline-flex items-center text-emerald-600 font-bold hover:gap-2 transition-all">
                ← 返回 14 天完整行程規劃
            </a>
        </div>
    </main>

            { id: 36, name: "Capanna Alpina to Fanes", region: "Alta Badia", cable: "無", price: "N/A", card: "N/A", diff: "中等", ll: "46.570,12.000", z: 14 },

            { id: 40, name: "Santa Maddalena Trail", region: "Val di Funes", cable: "無", price: "N/A", card: "N/A", diff: "容易", ll: "46.643,11.795", z: 15 }
        ];

        let currentActiveId = null;

        function updateMap(hike) {
            const frame = document.getElementById('mapFrame');
            const title = document.getElementById('mapTitle');
            const desc = document.getElementById('mapDesc');
            
            const newSrc = `https://www.google.com/maps/d/embed?mid=1dm50krnt7U7fzArdIuKK-EXnnJ2fOkvJ&femb=1&ll=${hike.ll}&z=${hike.z}`;
            frame.src = newSrc;
            
            title.innerText = `正在查看：${hike.name}`;
            desc.innerText = `${hike.region} | ${hike.diff}`;

            // Update row highlighting
            document.querySelectorAll('.hike-row').forEach(row => row.classList.remove('active'));
            const activeRow = document.querySelector(`[data-id="${hike.id}"]`);
            if (activeRow) activeRow.classList.add('active');
            
            // Scroll map into view on mobile
            if (window.innerWidth < 1024) {
                document.querySelector('.map-container').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderHikes(data) {
            const list = document.getElementById('hikeList');
            list.innerHTML = '';
            
            data.forEach(hike => {
                const tr = document.createElement('tr');
                tr.className = 'hike-row group';
                tr.setAttribute('data-id', hike.id);
                tr.onclick = () => updateMap(hike);
                
                const diffClass = hike.diff === '容易' ? 'tag-easy' : (hike.diff === '中等' ? 'tag-medium' : 'tag-hard');
                const priceBadge = hike.price !== 'N/A' ? `<span class="ml-2 text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono">${hike.price}</span>` : '';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-800">
                        <div class="flex flex-col">
                            <span>${hike.id}. ${hike.name}</span>
                            <span class="text-[10px] text-slate-400 font-normal mt-1 flex items-center gap-1">
                                <i data-lucide="info" class="w-3 h-3"></i> 纜車：${hike.cable}${priceBadge}
                            </span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-slate-600">${hike.region}</td>
                    <td class="px-6 py-4">
                        <span class="difficulty-tag ${diffClass}">${hike.diff}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button class="p-2 rounded-full hover:bg-emerald-100 text-emerald-600 transition-colors">
                            <i data-lucide="map-pin" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
            lucide.createIcons();
        }

        function filterHikes(diff) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-emerald-500', 'text-white');
                if (btn.innerText === diff || (diff === 'all' && btn.innerText === '全部')) {
                    btn.classList.add('active', 'bg-emerald-500', 'text-white');
                }
            });

            const term = document.getElementById('hikeSearch').value.toLowerCase();
            const filtered = hikes.filter(h => 
                (diff === 'all' || h.diff === diff) && 
                (h.name.toLowerCase().includes(term) || h.region.toLowerCase().includes(term))
            );
            renderHikes(filtered);
        }

        document.getElementById('hikeSearch').addEventListener('input', () => {
            const activeFilter = document.querySelector('.filter-btn.active').innerText;
            filterHikes(activeFilter === '全部' ? 'all' : activeFilter);
        });

        // Initial render
        renderHikes(hikes);
        lucide.createIcons();
    </script>
</body>
</html>
